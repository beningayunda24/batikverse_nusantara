{% extends 'base.html' %}
{% block title %}Daftar — BATIKVERSE NUSANTARA{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon" style="font-size:2rem;">⬡</span>
      <h1 class="auth-title">Buat Akun</h1>
      <p class="auth-sub">Daftar untuk menggunakan Klasifikasi AI dan menyimpan riwayat pribadi</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Nama Lengkap</label>
        <input type="text" name="nama" class="form-input" placeholder="Nama Anda"
               value="{{ request.form.nama or '' }}" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" name="email" class="form-input" placeholder="email@contoh.com"
               value="{{ request.form.email or '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
        <div class="input-pw-wrap">
          <input type="password" name="password" id="pwField" class="form-input"
                 placeholder="Minimal 6 karakter" required>
          <button type="button" class="pw-toggle" onclick="togglePw('pwField',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Konfirmasi Password</label>
        <div class="input-pw-wrap">
          <input type="password" name="confirm_password" id="pwField2" class="form-input"
                 placeholder="Ulangi password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('pwField2',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
        <i class="fas fa-user-plus"></i> Buat Akun
      </button>
    </form>

    <p class="auth-switch">Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a></p>
  </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
function togglePw(id,btn){
  const f=document.getElementById(id);
  const show=f.type==='password';
  f.type=show?'text':'password';
  btn.innerHTML=show?'<i class="fas fa-eye-slash"></i>':'<i class="fas fa-eye"></i>';
}
</script>
{% endblock %}
